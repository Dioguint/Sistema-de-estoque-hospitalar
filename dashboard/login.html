<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Dashboard Hospitalar</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-wrapper">
  <div class="login-card" role="main">
    <h1>🏥 <span>Dashboard Hospitalar</span></h1>
    <p id="login-desc">Faça login para acessar o sistema.</p>

    <form id="loginForm" novalidate aria-describedby="login-desc loginError">

      <div class="form-group">
        <label for="username">Usuário</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="seu usuário"
          autocomplete="username"
          required
          aria-required="true"
          aria-describedby="loginError"
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
          aria-required="true"
          aria-describedby="loginError"
        />
      </div>

      <p class="login-error" id="loginError" role="alert" aria-live="assertive" aria-atomic="true"></p>

      <button type="submit" class="btn-primary">Entrar</button>

    </form>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
