<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Métricas Hospitalares</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🏥 Dashboard de Métricas Hospitalares</h1>
    <span id="updated"></span>
  </div>
  <div class="header-right">
    <span id="nomeUsuario"></span>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>
</header>

<main>

  <!-- KPIs -->
  <section class="kpis" id="kpis"></section>

  <!-- Gráficos -->
  <section class="charts">
    <div class="card">
      <div class="card-title">Movimentações — últimos 7 dias</div>
      <canvas id="chartMovs"></canvas>
    </div>
    <div class="card">
      <div class="card-title">Distribuição por categoria</div>
      <canvas id="chartCats"></canvas>
    </div>
  </section>

  <!-- Modal de detalhes -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <button class="modal-close" id="modalClose" aria-label="Fechar">✕</button>
      <h2 id="modalTitle">Detalhes do Produto</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Tabela de críticos -->
  <div class="card">
    <div class="toolbar">
      <div class="card-title">Itens em Estoque Crítico</div>
      <button class="btn-export" id="btnExport">⬇ Exportar CSV</button>
    </div>

    <div class="filters">
      <input
        type="search"
        class="filter-input"
        id="inputBusca"
        placeholder="Buscar por nome do produto..."
        aria-label="Buscar produto"
      />
      <select class="filter-select" id="selectCategoria" aria-label="Filtrar por categoria">
        <option value="">Todas as categorias</option>
      </select>
      <span class="filter-count" id="filterCount"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Qtd. Atual</th>
            <th>Mínimo</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tabelaCriticos"></tbody>
      </table>
    </div>
  </div>

</main>

<footer>
  Dashboard de Métricas Hospitalares · Diogo Bello ·
  <a href="https://github.com/Dioguint" target="_blank" rel="noopener noreferrer">github.com/Dioguint</a>
</footer>

<script src="js/main.js"></script>
</body>
</html>
